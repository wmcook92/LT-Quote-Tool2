<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SMB Financing Comparison Tool</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#0f172a}button,input,select,textarea{font:inherit}main{max-width:1280px;margin:0 auto;padding:32px 20px 56px}header{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:18px}h1{font-size:clamp(32px,5vw,56px);line-height:1;margin:4px 0 10px}h2,h3,p{margin:0}.eyebrow{font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#047857}.primary,.secondary,.actions button{display:inline-flex;align-items:center;gap:8px;border:0;border-radius:16px;background:#059669;color:white;padding:10px 14px;font-weight:700;cursor:pointer}.secondary,.actions button{background:white;color:#334155;border:1px solid #e2e8f0}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}.print-control{display:flex;flex-direction:column;gap:6px}.pdf-note{font-size:12px;color:#64748b;font-style:italic;max-width:260px;line-height:1.35}.quote-toolbar{display:flex;justify-content:flex-start;margin:18px 0}.panel,.card,.proposal{background:white;border:1px solid #e2e8f0;border-radius:28px;box-shadow:0 10px 30px rgba(15,23,42,.05)}.panel{padding:18px;margin-bottom:18px}.panel h2{font-size:18px;margin-bottom:12px}.customer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.toggles{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.toggle{border:1px solid #cbd5e1;border-radius:999px;background:#fff;color:#475569;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer}.toggle.on{border-color:#86efac;background:#ecfdf5;color:#047857}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.card{padding:20px}.recommended{border-color:#34d399;box-shadow:0 0 0 3px #d1fae5}.cardtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}.cardtop h3{font-size:22px}.cardtop p,.muted{color:#64748b}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions button{padding:8px 10px}.inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.field{display:flex;flex-direction:column;gap:5px;color:#64748b;font-size:12px;font-weight:700}.field input,.field select,.field textarea{width:100%;border:1px solid #cbd5e1;border-radius:12px;background:white;color:#0f172a;padding:9px 10px}.field textarea{min-height:82px;resize:vertical}.wide{grid-column:1/-1}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0;padding:14px;border-radius:20px;background:#f8fafc}.metric span{display:block;font-size:12px;color:#64748b}.metric strong{display:block;margin-top:2px;font-size:16px}.metric .good{color:#047857}.stips{margin-bottom:14px}.stips b{display:flex;align-items:center;gap:8px;margin-bottom:10px}.stips div{display:flex;flex-wrap:wrap;gap:7px}.stips button{border:1px solid #e2e8f0;border-radius:999px;background:white;color:#64748b;padding:6px 10px;font-size:12px;cursor:pointer}.stips button.active{border-color:#86efac;background:#ecfdf5;color:#047857}.badge{display:inline-block;margin-left:8px;border-radius:999px;background:#059669;color:white;font-size:11px;padding:4px 8px}.proposal{display:none;margin-top:18px;padding:28px}.proposal.show{display:block}.proposal-head{display:flex;justify-content:space-between;gap:18px;border-bottom:2px solid #e2e8f0;padding-bottom:18px;margin-bottom:18px}.proposal h2{font-size:30px}.proposal-customer{font-size:14px;color:#475569;line-height:1.6}.rec{color:#047857;font-weight:800}.confidential{display:inline-block;margin-top:10px;border:1px solid #fecaca;background:#fef2f2;color:#991b1b;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;letter-spacing:.02em}.proposal-table{width:100%;border-collapse:separate;border-spacing:0;margin-top:18px;table-layout:fixed;border:1px solid #bbf7d0;border-radius:14px;overflow:hidden}.proposal-table th,.proposal-table td{text-align:left;border-bottom:1px solid #e2e8f0;padding:11px 10px;font-size:14px;vertical-align:top;white-space:normal;overflow-wrap:anywhere;word-break:normal}.proposal-table th{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#64748b;background:#f0fdf4}.proposal-table .field-col{font-weight:800;color:#475569;width:190px;overflow-wrap:normal}.proposal-table .row-label{color:#64748b;font-weight:650}.proposal-table th.quote-col{text-align:left}.proposal-table .quote-cell,.proposal-table th.quote-col{border-left:1px solid #bbf7d0}.proposal-table .recommended-col{background:#ecfdf5}.proposal-table th.recommended-col{color:#047857}.proposal-table tbody tr:last-child td{border-bottom:0}.proposal-notes{margin-top:18px;padding:16px;border-radius:18px;background:#f8fafc;color:#334155}.proposal-disclaimer{margin-top:8px;font-size:11px;color:#64748b;line-height:1.4}@media(max-width:900px){header,.proposal-head{display:block}.toolbar{margin-top:12px}.grid{grid-template-columns:1fr}.inputs,.metrics,.customer-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){main{padding:20px 12px}.inputs,.metrics,.customer-grid{grid-template-columns:1fr}.cardtop{display:block}.actions{margin-top:10px}.proposal-table{display:block;overflow-x:auto}}
@media print{body{background:white}main{max-width:none;padding:0}.app-only,header,.panel,.grid{display:none!important}.proposal{display:block!important;box-shadow:none;border:0;border-radius:0;padding:0}.proposal-head{break-inside:avoid}.proposal-table th,.proposal-table td{font-size:11px;padding:8px 6px}.no-print{display:none!important}}
</style>
</head>
<body>
<main>
<header class="app-only"><div><p class="eyebrow">LendingTree</p><h1>SMB Financing Comparison Tool</h1><p>Compare SMB financing options and generate a customer-facing pre-approval summary.</p></div><div class="toolbar"><button class="secondary" id="toggleProposal">Preview proposal</button><div class="print-control"><button class="primary" id="printProposal">Print / Save PDF</button><p class="pdf-note">For best results, uncheck Headers & Footers in print settings.</p></div></div></header>
<section class="panel app-only"><h2>Customer details</h2><div class="customer-grid"><label class="field"><span>Customer name</span><input id="customerName" placeholder="Contact name"></label><label class="field"><span>Business name</span><input id="businessName" placeholder="Business name"></label><label class="field"><span>Prepared by</span><input id="preparedBy" placeholder="Your name"></label><label class="field"><span>Proposal date</span><input id="proposalDate" type="date"></label></div><h2 style="margin-top:18px">Customer proposal visibility</h2><p class="muted">Toggle fields on or off before printing or saving as PDF.</p><div class="toggles" id="visibilityToggles"></div></section>
<section id="proposal" class="proposal"></section>
<section class="quote-toolbar app-only"><button class="primary" id="addQuote">+ Add quote</button></section>
<section class="grid app-only" id="quotes"></section>
</main>
<script>
const lenderConfig=[{lender:'OnDeck',prepayType:'Standard',standardPrepayPct:.25,has100Prepay:true},{lender:'Forward Financing',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Kapitus',prepayType:'Standard',standardPrepayPct:.1,has100Prepay:true},{lender:'Mulligan',prepayType:'Standard',standardPrepayPct:.5,has100Prepay:true},{lender:'Byzfunder',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Bitty Advance',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Expansion Capital',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Pearl Capital',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'CAN Capital',prepayType:'Standard',standardPrepayPct:.3,has100Prepay:false},{lender:'Vox Funding',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Samson',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Peac Solutions',prepayType:'Standard',standardPrepayPct:.3,has100Prepay:true},{lender:'BriteCap',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Bluevine',prepayType:'Standard',standardPrepayPct:null,has100Prepay:true},{lender:'Fora Financial',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'BHG Financial',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Biz2Credit',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Rapid Finance',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Idea Financial',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Quantum Solutions',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false}];
const stips=['Drivers License','Voided Check','Bank Verification','Month to Date Transactions','ID Verification','Tax Return','Aging A/R','Aging A/P','YTD P&L','Year End P&L','YTD Balance Sheet','Year End Balance Sheet','8821','Virtual Site Inspection','Payoff Letter','Transfer Account Bank Statements','Merchant Interview','Funding call','Additional bank statements','Online Checkout'];
const proposalFields=[['lender','Lender'],['fundingAmount','Funding amount'],['netFunding','Net funding'],['payoffBalance','Payoff balance'],['paymentStructure','Payment frequency'],['numberOfPayments','Number of payments'],['paymentAmount','Payment amount'],['totalRepayment','Total repayment'],['interestRate','Interest rate'],['originationFee','Origination fee'],['prepaymentDiscount','Prepayment discount'],['term','Estimated term'],['stipulations','Stipulations'],['notes','Quote notes']];
const uid=()=>Math.random().toString(36).slice(2);let customer={customerName:'',businessName:'',preparedBy:'',proposalDate:''};let visible=Object.fromEntries(proposalFields.map(([k])=>[k,true]));
const blankQuote=()=>({id:uid(),lender:'',prepayOption:'',customPrepayBreakdown:'',fundingAmount:'',outstandingBalance:'',interestWaived:'',paymentStructure:'',numberOfPayments:'',originationFeePct:null,manualOriginationFee:'',interestRate:'',recommended:false,notes:'',stipulations:{}});
let quotes=[blankQuote()];
const money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(v||0));
const pct=v=>v===null||v===undefined||v===''?'—':new Intl.NumberFormat('en-US',{style:'percent',maximumFractionDigits:2}).format(Number(v));
const pctPoints=v=>v===null||v===undefined||v===''?'—':Number(v).toLocaleString('en-US',{maximumFractionDigits:2})+'%';
const safe=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function months(s,p){p=Number(p||0);const raw=s==='Daily'?p/21:s==='Weekly'?p/4.33:s==='Bi Weekly'?p/2.166:p;return Math.round(raw*2)/2}
function prepay(q){const c=lenderConfig.find(x=>x.lender===q.lender);if(!c)return'—';if(q.prepayOption==='Custom')return q.customPrepayBreakdown||'Custom';if(c.prepayType==='Custom Prepay')return q.customPrepayBreakdown||'Custom';if(q.prepayOption==='100%'&&c.has100Prepay)return'100%';if(typeof c.standardPrepayPct==='number')return pct(c.standardPrepayPct);return c.has100Prepay?'100%':'—'}
function calc(q){const funding=Number(q.fundingAmount||0),payments=Number(q.numberOfPayments||0),rate=Number(q.interestRate||0)/100,feePct=q.originationFeePct===null||q.originationFeePct===''?null:Number(q.originationFeePct),originationFee=feePct===null?Number(q.manualOriginationFee||0):funding*(feePct/100),totalRepayment=funding*(1+rate),paymentAmount=payments?totalRepayment/payments:0,interestWaived=Number(q.interestWaived||0),payoffBalance=Math.max(0,Number(q.outstandingBalance||0)-interestWaived),netFunding=funding-payoffBalance-originationFee;return{...q,originationFee,totalRepayment,paymentAmount,payoffBalance,netFunding,months:months(q.paymentStructure,payments),prepaymentDiscount:prepay(q)}}
function metric(label,value,good=''){return`<div class="metric"><span>${label}</span><strong class="${good?'good':''}">${value}</strong></div>`}
function field(label,body,wide=false){return`<label class="field ${wide?'wide':''}"><span>${label}</span>${body}</label>`}
function options(arr,value){return '<option value="" '+(value===''?'selected':'')+'></option>'+arr.map(x=>`<option ${x===value?'selected':''}>${x}</option>`).join('')}
function shownStips(q){return stips.filter(s=>q.stipulations?.[s]).join(', ')||'None listed'}
function valueFor(q,key){if(key==='lender')return safe(q.lender);if(key==='fundingAmount')return money(q.fundingAmount);if(key==='netFunding')return money(q.netFunding);if(key==='payoffBalance')return money(q.payoffBalance);if(key==='paymentStructure')return safe(q.paymentStructure);if(key==='numberOfPayments')return safe(q.numberOfPayments);if(key==='paymentAmount')return money(q.paymentAmount);if(key==='totalRepayment')return money(q.totalRepayment);if(key==='interestRate')return pctPoints(q.interestRate);if(key==='originationFee')return money(q.originationFee);if(key==='prepaymentDiscount')return safe(q.prepaymentDiscount);if(key==='term')return q.months.toFixed(1)+' months';if(key==='stipulations')return safe(shownStips(q));if(key==='notes')return safe(q.notes||'');return''}
function renderToggles(){document.getElementById('visibilityToggles').innerHTML=proposalFields.map(([k,label])=>`<button class="toggle ${visible[k]?'on':''}" data-toggle="${k}">${visible[k]?'✓ ':''}${label}</button>`).join('')}
function renderProposal(cs,rec){const fields=proposalFields.filter(([k])=>visible[k]);const recHtml=rec?`<div><p class="rec">Recommended option</p><h3>${safe(rec.lender)}</h3><p class="muted">${money(rec.netFunding)} estimated net funding</p></div>`:'';document.getElementById('proposal').innerHTML=`<div class="proposal-head"><div><p class="eyebrow">LendingTree Pre-Approval Summary</p><h2>${safe(customer.businessName)||'Merchant Financing Options'}</h2><p class="proposal-customer">${safe(customer.customerName)?'Prepared for: '+safe(customer.customerName)+'<br>':''}${safe(customer.preparedBy)?'Prepared by: '+safe(customer.preparedBy)+'<br>':''}${customer.proposalDate?'Date: '+safe(customer.proposalDate):''}</p><p class="confidential">Confidential: do not share</p></div>${recHtml}</div><table class="proposal-table"><thead><tr><th class="field-col"></th>${cs.map((q,i)=>`<th class="quote-col ${q.recommended?'recommended-col':''}">Quote ${i+1}${q.recommended?' • Recommended':''}</th>`).join('')}</tr></thead><tbody>${fields.map(([k,label])=>`<tr><td class="field-col row-label">${label}</td>${cs.map(q=>`<td class="quote-cell ${q.recommended?'recommended-col':''}">${valueFor(q,k)}</td>`).join('')}</tr>`).join('')}</tbody></table><div class="proposal-notes"><strong>Next steps:</strong> Review and select your preferred option.<div class="proposal-disclaimer">Final terms vary based on lender review, payoff verification and funding stipulations.</div></div>`}
function render(){document.getElementById('customerName').value=customer.customerName;document.getElementById('businessName').value=customer.businessName;document.getElementById('preparedBy').value=customer.preparedBy;document.getElementById('proposalDate').value=customer.proposalDate;renderToggles();const cs=quotes.map(calc);const rec=cs.find(q=>q.recommended)||null;document.getElementById('quotes').innerHTML=cs.map((q,i)=>`<article class="card ${q.recommended?'recommended':''}" data-id="${q.id}"><div class="cardtop"><div><h3>Quote ${i+1}${q.recommended?'<span class="badge">Recommended</span>':''}</h3><p>${safe(q.lender)}</p></div><div class="actions"><button data-act="recommend">${q.recommended?'Unrecommend':'Recommend'}</button><button data-act="duplicate">Duplicate</button><button data-act="remove">Delete</button></div></div><div class="inputs">${field('Lender',`<select data-field="lender"><option value="" ${q.lender===''?'selected':''}></option>${lenderConfig.map(x=>`<option ${x.lender===q.lender?'selected':''}>${x.lender}</option>`).join('')}</select>`)}${field('Prepay option',`<select data-field="prepayOption">${options(['Standard','100%','Custom'],q.prepayOption)}</select>`)}${field('Payment structure',`<select data-field="paymentStructure">${options(['Daily','Weekly','Bi Weekly','Monthly'],q.paymentStructure)}</select>`)}${field('Funding amount',`<input type="number" data-field="fundingAmount" value="${q.fundingAmount}">`)}${field('Outstanding balance',`<input type="number" data-field="outstandingBalance" value="${q.outstandingBalance}">`)}${field('Interest waived',`<input type="number" data-field="interestWaived" value="${q.interestWaived}">`)}${field('Payments',`<input type="number" data-field="numberOfPayments" value="${q.numberOfPayments}">`)}${field('Interest rate',`<input type="number" step="0.1" data-field="interestRate" value="${q.interestRate}">`)}${field('Origination fee %',`<input type="number" step="0.01" data-field="originationFeePct" value="${q.originationFeePct??''}">`)}${field('Manual fee',`<input type="number" data-field="manualOriginationFee" value="${q.manualOriginationFee}">`)}${q.prepayOption==='Custom'?field('Custom prepay breakdown',`<textarea data-field="customPrepayBreakdown" placeholder="Example: 20% discount if paid by day 30; 10% discount if paid by day 60...">${safe(q.customPrepayBreakdown||'')}</textarea>`,true):''}</div><div class="metrics">${metric('Term',q.months.toFixed(1)+' mo')}${metric('Payment',money(q.paymentAmount))}${metric('Repayment',money(q.totalRepayment))}${metric('Net funding',money(q.netFunding),true)}${metric('Origination fee',money(q.originationFee))}${metric('Prepay discount',safe(q.prepaymentDiscount))}${metric('Rate',pctPoints(q.interestRate))}${metric('Fee basis',q.originationFeePct===null||q.originationFeePct===''?'Manual $':pctPoints(q.originationFeePct))}</div><div class="stips"><b>📄 Stipulations requested</b><div>${stips.map(s=>`<button data-stip="${s}" class="${q.stipulations?.[s]?'active':''}">${q.stipulations?.[s]?'✓ ':''}${s}</button>`).join('')}</div></div>${field('Quote-specific notes',`<textarea data-field="notes" placeholder="Add notes for this quote...">${safe(q.notes||'')}</textarea>`,true)}</article>`).join('');renderProposal(cs,rec)}
function normalizeField(field,value){if(field==='originationFeePct')return value===''?null:value;return value}
function updateQuiet(id,patch){quotes=quotes.map(q=>q.id===id?{...q,...patch}:q)}
function update(id,patch){updateQuiet(id,patch);render()}
document.addEventListener('input',e=>{if(['customerName','businessName','preparedBy','proposalDate'].includes(e.target.id)){customer[e.target.id]=e.target.value;const cs=quotes.map(calc);renderProposal(cs,cs.find(q=>q.recommended)||null);return}const card=e.target.closest('.card');if(!card||!e.target.dataset.field)return;updateQuiet(card.dataset.id,{[e.target.dataset.field]:normalizeField(e.target.dataset.field,e.target.value)})});
document.addEventListener('change',e=>{const card=e.target.closest('.card');if(card&&e.target.dataset.field)update(card.dataset.id,{[e.target.dataset.field]:normalizeField(e.target.dataset.field,e.target.value)})});
document.addEventListener('focusout',e=>{const card=e.target.closest('.card');if(card&&e.target.dataset.field)render()});
document.addEventListener('click',e=>{const card=e.target.closest('.card');if(e.target.dataset.toggle){visible[e.target.dataset.toggle]=!visible[e.target.dataset.toggle];render();return}if(e.target.id==='toggleProposal'){document.getElementById('proposal').classList.toggle('show');e.target.textContent=document.getElementById('proposal').classList.contains('show')?'Hide proposal':'Preview proposal';return}if(e.target.id==='printProposal'){document.getElementById('proposal').classList.add('show');window.print();return}if(e.target.id==='addQuote'){quotes.push(blankQuote());render();return}if(!card)return;if(e.target.dataset.act==='recommend'){const target=quotes.find(q=>q.id===card.dataset.id);const makeRecommended=!(target&&target.recommended);quotes=quotes.map(q=>({...q,recommended:makeRecommended&&q.id===card.dataset.id}));render()}if(e.target.dataset.act==='duplicate'){const source=quotes.find(q=>q.id===card.dataset.id);if(source){const copy={...source,id:uid(),recommended:false,stipulations:{...(source.stipulations||{})}};const idx=quotes.findIndex(q=>q.id===card.dataset.id);quotes=[...quotes.slice(0,idx+1),copy,...quotes.slice(idx+1)];render()}return}if(e.target.dataset.act==='remove'&&quotes.length>1){quotes=quotes.filter(q=>q.id!==card.dataset.id);render()}if(e.target.dataset.stip){quotes=quotes.map(q=>q.id===card.dataset.id?{...q,stipulations:{...q.stipulations,[e.target.dataset.stip]:!q.stipulations?.[e.target.dataset.stip]}}:q);render()}});
render();
</script>
</body>
</html>
